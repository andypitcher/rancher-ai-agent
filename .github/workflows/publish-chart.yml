name: Publish Helm Chart

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  CHART_PATH: ./chart/agent

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from Git tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update Chart.yaml with new version
        run: |
          echo "Updating chart to version ${{ env.VERSION }}"
          sed -i "s/^version: .*/version: ${{ env.VERSION }}/" ${{ env.CHART_PATH }}/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ env.VERSION }}\"/" ${{ env.CHART_PATH }}/Chart.yaml

          echo "--- Chart.yaml after update ---"
          cat ${{ env.CHART_PATH }}/Chart.yaml
          echo "------------------------------"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: helm package ${{ env.CHART_PATH }} --destination .helm-packages

      - name: Push chart to GHCR OCI registry
        run: helm push .helm-packages/rancher-ai-agent-${{ env.VERSION }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository }}/charts
